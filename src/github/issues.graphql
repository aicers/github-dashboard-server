query Issues(
  $owner: String!
  $name: String!
  $first: Int
  $last: Int
  $before: String
  $after: String
  $since: DateTime
) {
  repository(owner: $owner, name: $name) {
    issues(
      first: $first
      last: $last
      before: $before
      after: $after
      filterBy: { since: $since }
    ) {
      pageInfo {
        hasNextPage
        endCursor
      }
      nodes {
        id
        number
        title
        body
        state
        closedAt
        createdAt
        updatedAt
        repository {
          name
          owner {
            __typename
            login
          }
        }
        author {
          __typename
          ... on User {
            login
          }
        }
        assignees(last: 5) {
          nodes {
            login
          }
        }
        labels(last: 5) {
          nodes {
            name
          }
        }
        comments(last: 100) {
          totalCount
          nodes {
            author {
              __typename
              ... on User {
                login
              }
            }
            body
            createdAt
            id
            repository {
              name
            }
            updatedAt
            url
          }
        }
        projectItems(last: 5) {
          totalCount
          nodes {
            id
          }
        }
        projectV2(number: 4) {
          id
          title
          items(last: 5) {
            totalCount
          }
        }
        projectsV2(last: 5) {
          totalCount
          nodes {
            id
            title
            items(last: 5) {
              totalCount
            }
          }
        }
        subIssues(last: 20) {
          totalCount
          nodes {
            id
            number
            title
            state
            closedAt
            createdAt
            updatedAt
            author {
              __typename
              ... on User {
                login
              }
            }
            assignees(last: 5) {
              nodes {
                login
              }
            }
          }
        }
        parent {
          id
          number
          title
        }
        url
        closedByPullRequestsReferences(last: 5) {
          edges {
            node {
              number
              state
              closedAt
              createdAt
              updatedAt
              author {
                __typename
                ... on User {
                  login
                }
              }
              url
            }
          }
        }
      }
    }
  }
}
